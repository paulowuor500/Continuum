services:
  - type: web
    name: continuum-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: continuum-db
          property: connectionString
      - key: LND_HOST
        value: your-lnd-host:10009
      - key: LND_MACAROON_PATH
        value: /etc/lnd/admin.macaroon
      - key: LND_TLS_CERT_PATH
        value: /etc/lnd/tls.cert
      - key: ALLOW_DEV_TIME_WARP
        value: false

  - type: web
    name: continuum-web
    env: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        value: https://continuum-api.onrender.com/api

databases:
  - name: continuum-db
    databaseName: continuum
    user: continuum
    region: oregon
    plan: free
