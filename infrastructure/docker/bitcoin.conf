# Core Node Operations
regtest=1
txindex=1
server=1

[regtest]
# Network & RPC Binding
rpcbind=0.0.0.0
rpcport=18443

# Security Hardening: Only allow local loopback and internal private Docker network subnets
rpcallowip=127.0.0.1
rpcallowip=10.0.0.0/8
rpcallowip=172.16.0.0/12
rpcallowip=192.168.0.0/16

# Credentials
rpcuser=continuum
rpcpassword=finality

# Block & Fee Market Parameters
fallbackfee=0.0002
minrelaytxfee=0.00001
discover=0
listen=1

# ==============================================================================
# ⚡ ZeroMQ Notification Stream Settings (Required for LND Sync)
# ==============================================================================
# Bind ZMQ streams to all internal network interfaces so the LND container can subscribe
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333