[Application Options]
debuglevel=info
maxpendingchannels=5

# Network Listeners (Crucial for your Go API to talk to LND)
listen=0.0.0.0:9735
rpclisten=0.0.0.0:10009
restlisten=0.0.0.0:8080

# TLS Hardening: Instruct LND to include these SANs in its certificate
tlsextraip=0.0.0.0
tlsextradomain=lnd
tlsextradomain=localhost

# Automated Unlock Configuration
wallet-unlock-password-file=/root/.lnd/password.txt

[Bitcoin]
bitcoin.active=true
bitcoin.regtest=true
bitcoin.node=bitcoind

[Bitcoind]
bitcoind.rpchost=bitcoind:18443
bitcoind.rpcuser=continuum
bitcoind.rpcpass=finality
# ZMQ interfaces let LND listen to block/transaction events instantly
bitcoind.zmqpubrawblock=tcp://bitcoind:28332
bitcoind.zmqpubrawtx=tcp://bitcoind:28333

[Routing]
routing.assumechanvalid=true